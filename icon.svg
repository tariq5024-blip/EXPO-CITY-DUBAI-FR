<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2d4a"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20d68a"/>
      <stop offset="100%" style="stop-color:#20c0d6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  
  <!-- Face outline -->
  <circle cx="64" cy="56" r="28" fill="none" stroke="url(#face)" stroke-width="4"/>
  
  <!-- Eyes -->
  <circle cx="52" cy="52" r="4" fill="#20d68a"/>
  <circle cx="76" cy="52" r="4" fill="#20d68a"/>
  
  <!-- Smile -->
  <path d="M 48 68 Q 64 80 80 68" fill="none" stroke="#20d68a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Scan lines -->
  <line x1="20" y1="56" x2="36" y2="56" stroke="#20d68a" stroke-width="2" opacity="0.6"/>
  <line x1="92" y1="56" x2="108" y2="56" stroke="#20d68a" stroke-width="2" opacity="0.6"/>
  
  <!-- Lock icon at bottom -->
  <rect x="54" y="92" width="20" height="16" rx="3" fill="none" stroke="#20d68a" stroke-width="3"/>
  <path d="M 58 92 L 58 88 Q 58 82 64 82 Q 70 82 70 88 L 70 92" fill="none" stroke="#20d68a" stroke-width="3"/>
  
  <!-- Status dot -->
  <circle cx="108" cy="108" r="8" fill="#20d68a"/>
</svg>
