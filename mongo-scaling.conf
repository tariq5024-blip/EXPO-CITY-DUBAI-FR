# MongoDB Enterprise Configuration for Dell R440 Unlimited Scale
# Place in /etc/mongod.conf or mount into container

storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      # 50% of available RAM for cache (adjust based on total RAM)
      cacheSizeGB: 32
      journalCompressor: zlib
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  logRotate: reopen

net:
  port: 27017
  bindIp: 0.0.0.0
  # Increase for high connection counts
  maxIncomingConnections: 2000

processManagement:
  timeZoneInfo: /usr/share/zoneinfo

# Enable replication for read scaling (single node replica set)
replication:
  replSetName: rs0

# Sharding preparation (for 100K+ employees)
sharding:
  clusterRole: shardsvr

# Performance tuning
setParameter:
  # Faster writes, slight durability tradeoff
  wiredTigerConcurrentWriteTransactions: 128
  wiredTigerConcurrentReadTransactions: 128
  # Enable for large document queries
  failIndexKeyTooLong: false

# Security
security:
  authorization: enabled
